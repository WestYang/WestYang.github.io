name: Build Markdown and Publish Root

on:
  push:
    branches:
      - master
    paths:
      - "posts/**/*.md"
      - "scripts/build_site.py"
      - "scripts/sync_dist_to_root.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Site
        run: python scripts/build_site.py

      - name: Sync Dist to Root
        run: python scripts/sync_dist_to_root.py

      - name: Commit Generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog index.html archives.html about.html css js
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "chore: auto-generate html from markdown"
          git push
