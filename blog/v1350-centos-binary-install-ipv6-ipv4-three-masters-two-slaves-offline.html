            <h5 id="ubuntu">Ubuntu 涓嬭浇鍖呭拰渚濊禆</h5>
            <pre><code class="language-shell">#!/bin/bash
            
            logfile=123.log
            ret=&quot;&quot;
            function getDepends()
            {
               echo &quot;fileName is&quot; $1&gt;&gt;$logfile
               # use tr to del &lt; &gt;
               ret=`apt-cache depends $1|grep Depends |cut -d: -f2 |tr -d &quot;&lt;&gt;&quot;`
               echo $ret|tee  -a $logfile
            }
            # 闇€瑕佽幏鍙栧叾鎵€渚濊禆鍖呯殑鍖?
            libs=&quot;wget psmisc vim net-tools nfs-kernel-server telnet lvm2 git tar curl gcc keepalived haproxy bash-completion chrony sshpass ipvsadm ipset sysstat conntrack libseccomp&quot;
            
            # download libs dependen. deep in 3
            i=0
            while [ $i -lt 3 ] ;
            do
                let i++
                echo $i
                # download libs
                newlist=&quot; &quot;
                for j in $libs
                do
                    added=&quot;$(getDepends $j)&quot;
                    newlist=&quot;$newlist $added&quot;
                    apt install $added --reinstall -d -y
                done
            
                libs=$newlist
            done
            
            # 鍒涘缓婧愪俊鎭?
            apt install dpkg-dev
            sudo cp /var/cache/apt/archives/*.deb /data/ubuntu/ -r
            dpkg-scanpackages . /dev/null |gzip &gt; /data/ubuntu/Packages.gz -r
            
            # 鎷疯礉鍖呭埌鍐呯綉鏈哄櫒涓?
            scp -r ubuntu/ root@192.168.1.31:
            scp -r ubuntu/ root@192.168.1.32:
            scp -r ubuntu/ root@192.168.1.33:
            scp -r ubuntu/ root@192.168.1.34:
            scp -r ubuntu/ root@192.168.1.35:
            
            # 鍦ㄥ唴缃戞満鍣ㄤ笂閰嶇疆apt婧?
            vim /etc/apt/sources.list
            cat /etc/apt/sources.list
            deb file:////root/ ubuntu/
            
            # 瀹夎deb鍖?
            apt install ./*.deb
            </code></pre>

            <h3 id="222-containerdservice">2.2.2 鍒涘缓containerd鐨剆ervice鏂囦欢</h3>

            LimitNPROC=infinity

            <h1 id="17nfs">17.瀹夎NFS鍔ㄦ€佸瓨鍌?/h1>
            <pre><code class="language-shell"># 瀹夎nfs
            # CentOS
            yum install -y nfs-utils
            
            # Ubuntu
            apt install nfs-kernel-server nfs-common
            
            # 鍒涘缓鍏变韩
            mkdir /nfs
            
            # 缂栬緫鍏变韩
            vim /etc/exports
            /nfs *(rw,sync,no_root_squash,no_subtree_check)
            
            
            # centos 
            systemctl enable rpcbind.service
            systemctl enable nfs-server.service
            systemctl restart rpcbind.service
            systemctl restart nfs-server.service
            
            # ubuntu
            systemctl enable nfs-kernel-server
            systemctl restart nfs-kernel-server
            
            # 鍔犺浇閰嶇疆
            exportfs -a
            exportfs -r
            exportfs
            
            
            # 娣诲姞浠撳簱
            helm repo add nfs-subdir-external-provisioner https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
            # --set nfs.server 濉啓浣犵殑nfs鏈嶅姟鍣ㄥ湴鍧€
            # --set nfs.path 濉啓浣犵殑nfs鏈嶅姟鍣ㄨ矾寰?

                --set storageClass.defaultClass=true \
                --set nfs.server=192.168.1.31 \
                --set nfs.path=/nfs
